services:
  db:
    image: mysql:8.4
    container_name: burger-db
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: food_db
      MYSQL_USER: burger
      MYSQL_PASSWORD: burger
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 25s

  app:
    container_name: burger-app
    build:
      context: ./my-app
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: http://localhost:3001
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ""
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./my-app/.env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: mysql://burger:burger@db:3306/food_db
      NEXT_PUBLIC_APP_URL: http://localhost:3001
      PAYMENT_WEBHOOK_SECRET: docker-local-webhook-secret
      ENABLE_DEMO_ACCOUNTS: "true"
    ports:
      - "3001:3000"

volumes:
  mysql_data:
